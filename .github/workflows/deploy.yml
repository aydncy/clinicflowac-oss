name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
      
      - name: Install dependencies
        run: dart pub get
      
      - name: Build Docker image
        run: docker build -t clinicflowac:latest .
      
      - name: Push to Docker Hub
        if: github.event_name == 'push'
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker tag clinicflowac:latest ${{ secrets.DOCKER_USERNAME }}/clinicflowac:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/clinicflowac:latest